name: Link Check

on:
  push:
    branches: [master, main]
    paths: ['README.md']
  pull_request:
    paths: ['README.md']
  schedule:
    # Weekly check for link rot — catches drift without flooding CI
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --config .lychee.toml
            README.md
          fail: true

      - name: Show results
        if: always()
        run: cat lychee/out.md
