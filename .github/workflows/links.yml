name: Check links

# Verifies every link in the list is reachable. Replaces the old, flaky
# Travis + awesome_bot setup. Uses lychee, which retries transient failures
# and authenticates to GitHub (this list is almost entirely github.com links,
# so unauthenticated rate-limiting was the main cause of false failures).

on:
  push:
    branches: [master]
  pull_request:
  schedule:
    - cron: '27 6 * * 1'   # weekly (Mon 06:27 UTC) to catch link rot over time
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml --no-progress README.md CONTRIBUTING.md
          fail: true
        env:
          # Lets lychee use the GitHub API instead of anonymous requests,
          # which avoids rate-limit-driven false "broken link" reports on a
          # list made almost entirely of github.com links.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
